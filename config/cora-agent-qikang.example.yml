server:
  http_listen_address: 127.0.0.1
  http_listen_port: 9088
  grpc_listen_port: 0

positions:
  filename: /home/cora/qikang-positions.json

clients:
  - url: http://cora.internal:8080/v1/events:batch
    bearer_token_file: /home/cora/auth.token

defaults:
  product_line: qikang-zhifu
  environment: prod
  timezone: Asia/Shanghai

agent:
  start_at: end
  batch_size: 100
  batch_wait: 1s
  poll_interval: 250ms
  request_timeout: 3s
  max_retries: 5
  min_backoff: 250ms
  max_backoff: 5s
  max_event_bytes: 262144
  max_batch_bytes: 1572864

scrape_configs:
  - job_name: gb-auth_log_push
    static_configs:
      - labels:
          app: gb-auth
          server: backup
          ip: 172.16.0.229
          env: prod
          group: platform
          __path__: /home/qikang/data/gb-auth/supervisor.log

  - job_name: gb-front_log_push

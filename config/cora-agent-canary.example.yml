server:
  http_listen_address: 127.0.0.1
  http_listen_port: 9088
  grpc_listen_port: 0

positions:
  filename: /var/lib/cora-agent/positions.yml

clients:
  - url: http://10.0.0.10:8080/v1/events:batch
    bearer_token_file: /etc/cora/auth.token

defaults:
  product_line: gbjk-zhifu
  environment: prod
  timezone: Asia/Shanghai

agent:
  start_at: end
  batch_size: 100
  batch_wait: 1s
  poll_interval: 250ms
  request_timeout: 3s
  max_retries: 5
  min_backoff: 250ms
  max_backoff: 5s
  max_event_bytes: 262144
  max_batch_bytes: 1572864

scrape_configs:
  - job_name: gb-order_log_push
    static_configs:
      - labels:
          app: gb-order
          node: service01
          deployment_group: service
          env: prod
          __path__: /home/gbjk/data/gb-order/supervisor.log

[program:cora-server]
command=/opt/cora/current/cora-server -addr=10.0.0.10:8080 -db=/var/lib/cora/cora.db -auth-token-file=/etc/cora/auth.token
directory=/var/lib/cora
user=cora
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=3
startretries=5
stopsignal=TERM
stopwaitsecs=15
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/var/log/cora/cora-server.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5

server:
  http_listen_address: 127.0.0.1
  http_listen_port: ${CORA_AGENT_HEALTH_PORT}
  grpc_listen_port: 0
positions:
  filename: ${CORA_AGENT_POSITIONS}
clients:
  - url: ${CORA_ENDPOINT}
defaults:
  product_line: qikang-zhifu
  environment: test
  timezone: Asia/Shanghai
agent:
  start_at: beginning
  batch_wait: 30ms
  poll_interval: 10ms
scrape_configs:
  - job_name: gb-auth_log_push
    static_configs:
      - labels:
          app: gb-auth
          server: smoke
          env: test
          __path__: ${QIKANG_AUTH_LOG}
  - job_name: gb-order_log_push
    static_configs:
      - labels:
          app: gb-order
          server: smoke
          env: test
          __path__: ${QIKANG_ORDER_LOG}
